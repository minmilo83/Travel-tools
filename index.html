<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關西輕旅行｜動態抽顏色拍照遊戲</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 基礎設定與變數 --- */
        :root {
            --font-en: 'Inter', system-ui, -apple-system, sans-serif;
            --font-zh: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            --text-main: #2b2d42;
            --text-sub: #5c5f73;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-zh);
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f6fa;
        }

        /* --- 動態大面積漸層暈染背景 (Mesh Gradient) --- */
        .mesh-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
        }

        .mesh-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.65;
            animation: floatAround 14s ease-in-out infinite alternate;
        }

        /* 微醺紫 */
        .glow-1 {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, #e8dbfc 0%, transparent 70%);
            top: -10%;
            left: -5%;
            animation-duration: 12s;
        }

        /* 櫻花粉 */
        .glow-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #fcd3de 0%, transparent 70%);
            bottom: -10%;
            right: -5%;
            animation-duration: 16s;
        }

        /* 微光藍 */
        .glow-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #cdeefa 0%, transparent 70%);
            top: 50%;
            left: -15%;
            animation-duration: 14s;
        }

        @keyframes floatAround {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, 60px) scale(1.1); }
            100% { transform: translate(-30px, 30px) scale(0.95); }
        }

        /* --- 核心玻璃卡片 (Glassmorphic Card) --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 30px 60px rgba(31, 38, 135, 0.08), 
                        inset 0 1px 2px rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            padding: 3.5rem 2rem;
            width: 90%;
            max-width: 420px;
            text-align: center;
            color: var(--text-main);
            position: relative;
            z-index: 10;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 隱藏狀態 */
        .hidden {
            display: none !important;
        }

        /* --- 標題與版面留白設定 --- */
        .app-title {
            font-family: var(--font-en);
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            opacity: 0.7;
        }

        /* --- 初始狀態：液態玻璃按鈕 --- */
        .glass-btn {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            color: var(--text-main);
            padding: 1.2rem 1.5rem;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(31, 38, 135, 0.04),
                        inset 0 1px 1px rgba(255, 255, 255, 0.6);
            width: 100%;
            line-height: 1.5;
            letter-spacing: 0.5px;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(255, 255, 255, 1);
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(31, 38, 135, 0.1);
        }

        .glass-btn:active {
            transform: translateY(-1px);
        }

        /* --- 滾動動態特效區域 --- */
        .rolling-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.8rem;
        }

        .rolling-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            transition: background-color 0.06s ease, box-shadow 0.06s ease;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        .rolling-theme {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .rolling-hex {
            font-family: var(--font-en);
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-sub);
            opacity: 0.6;
        }

        /* --- 最終結果卡片 (優雅淡入與放大動畫) --- */
        .result-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.88) translateY(15px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .result-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin-bottom: 2rem;
            transition: box-shadow 0.5s ease;
        }

        .result-theme {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: var(--text-main);
            line-height: 1.4;
        }

        .result-task {
            font-size: 1rem;
            color: var(--text-sub);
            line-height: 1.6;
            margin-bottom: 1.8rem;
            padding: 0 0.5rem;
        }

        .result-hex-badge {
            font-family: var(--font-en);
            font-weight: 700;
            font-size: 0.85rem;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        /* 重新抽選小按鈕 */
        .glass-btn-sub {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.06);
            color: var(--text-sub);
            padding: 0.5rem 1.2rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-family: var(--font-en);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 2.2rem;
            letter-spacing: 0.5px;
        }

        .glass-btn-sub:hover {
            background: rgba(0, 0, 0, 0.08);
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="mesh-container">
        <div class="mesh-glow glow-1"></div>
        <div class="mesh-glow glow-2"></div>
        <div class="mesh-glow glow-3"></div>
    </div>

    <div class="glass-card">
        <div class="app-title">Kansai Color Mission</div>
        
        <div id="initial-state">
            <button id="scan-btn" class="glass-btn">
                [ INITIATE COLOR SCAN ]<br>點擊抽選今日幸運色
            </button>
        </div>

        <div id="rolling-state" class="hidden rolling-box">
            <div class="rolling-circle" id="rolling-circle"></div>
            <div class="rolling-theme" id="rolling-theme">掃描色彩矩陣中...</div>
            <div class="rolling-hex" id="rolling-hex">#??????</div>
        </div>

        <div id="result-state" class="hidden result-box">
            <div class="result-circle" id="result-circle"></div>
            <h2 class="result-theme" id="result-theme">主題名稱</h2>
            <p class="result-task" id="result-task">任務內容</p>
            <div class="result-hex-badge" id="result-hex">#HEXCODE</div>
            <button id="rescan-btn" class="glass-btn-sub">[ RE-SCAN ] 重新抽選</button>
        </div>
    </div>

    <script>
        // --- 72色動態模組化矩陣資料庫 ---
        const rawThemes = [
            {
                theme: "🌸 【京都伏見櫻花粉系】",
                task: "尋找街頭任何浪漫的「粉紅色」元素、櫻花意象或伴手禮包裝！",
                colors: ["#FFB3C1", "#FFA6C9", "#FF8FAB", "#FF758F", "#FF5C8A", "#FF477E"]
            },
            {
                theme: "🍵 【宇治古剎抹茶綠】",
                task: "捕捉一處帶有「綠色」植物的日式屋簷、庭園或抹茶甜點！",
                colors: ["#D8F3DC", "#B7E4C7", "#95D5B2", "#74C69D", "#52B788", "#40916C"]
            },
            {
                theme: "🎐 【鴨川微風縹緲藍系】",
                task: "捕捉任何「清澈淺藍色」的物品，如天空、河川或路人手上的折傘！",
                colors: ["#E0FBFC", "#C2F3F8", "#98E1EC", "#4EA8DE", "#0077B6", "#023E8A"]
            },
            {
                theme: "🏮 【道頓堀霓虹固力果紅】",
                task: "在繁華街頭尋找「亮紅色」的自動販賣機、燈籠或大型招牌合照！",
                colors: ["#FFCCD5", "#FFB3C1", "#FF8093", "#FF4D6D", "#C9184A", "#A30026"]
            },
            {
                theme: "🌆 【通天閣新世界日落橘】",
                task: "拍下帶著「夕陽橘色」元素的街景、黃昏天空或計程車車身！",
                colors: ["#FDE2E4", "#FFCAD4", "#F4A261", "#E76F51", "#D94E34", "#B23A22"]
            },
            {
                theme: "🚏 【黑門市場盛夏元氣黃】",
                task: "在身邊尋找任何醒目的「黃色」物品，如警戒線、衣服或路標挑戰擺拍！",
                colors: ["#FEFAE0", "#FFF3B0", "#FFD166", "#FFB703", "#FFAA00", "#E59500"]
            },
            {
                theme: "🌌 【梅田藍天大廈迷幻紫】",
                task: "拍下一張充滿都市科技感的「紫色」霓虹燈光、夜景或大樓玻璃折射！",
                colors: ["#E0AAFF", "#C77DFF", "#9D4EDD", "#7B2CBF", "#5A189A", "#3C096C"]
            },
            {
                theme: "🦌 【奈良春日大社神鹿褐】",
                task: "尋找古樸的「大地色、褐色」建築、木造鳥居或歷史感物件！",
                colors: ["#DDBDF1", "#EDE0D4", "#D6CCC2", "#F5EBE0", "#E3D5CA", "#D5BDAF"]
            },
            {
                theme: "🎋 【嵐山竹林深邃幽翠綠】",
                task: "尋找大自然或都市裡「深綠色」的陰影、青苔或竹子元素！",
                colors: ["#ECEFDE", "#D0DB97", "#698252", "#4A5738", "#373F27", "#1E2514"]
            },
            {
                theme: "🌊 【姬路城極簡冷冽灰藍】",
                task: "尋找帶著「高級灰藍色」的現代建築牆面、制服或工業風幾何線條！",
                colors: ["#E6EED6", "#D4E09B", "#A3C9A8", "#84B59F", "#69A297", "#50808E"]
            },
            {
                theme: "🍣 【黑潮市場炙燒鮭魚脂粉】",
                task: "尋找介於粉與橘之間的「珊瑚鮭魚色」，如生魚片、美食招牌或黃昏晚霞！",
                colors: ["#FBC4AB", "#FFB5A7", "#FFCAD4", "#F8AD9D", "#F4978E", "#F08080"]
            },
            {
                theme: "🦾 【未來特攻液態玻璃灰】",
                task: "尋找帶有「科技銀灰色、透明玻璃」質感的反光材質或現代幾何造景！",
                colors: ["#F8F9FA", "#E9ECEF", "#DEE2E6", "#CED4DA", "#ADB5BD", "#6C757D"]
            }
        ];

        // 扁平化處理，產出完整 72 個色彩隨機矩陣單元
        const colorDatabase = [];
        rawThemes.forEach(item => {
            item.colors.forEach(hex => {
                colorDatabase.push({
                    theme: item.theme,
                    task: item.task,
                    color: hex
                });
            });
        });

        // --- DOM 元件獲取 ---
        const scanBtn = document.getElementById('scan-btn');
        const rescanBtn = document.getElementById('rescan-btn');
        const initialState = document.getElementById('initial-state');
        const rollingState = document.getElementById('rolling-state');
        const resultState = document.getElementById('result-state');

        const rollingCircle = document.getElementById('rolling-circle');
        const rollingTheme = document.getElementById('rolling-theme');
        const rollingHex = document.getElementById('rolling-hex');

        const resultCircle = document.getElementById('result-circle');
        const resultTheme = document.getElementById('result-theme');
        const resultTask = document.getElementById('result-task');
        const resultHex = document.getElementById('result-hex');

        // --- 遊戲邏輯與互動流程 ---
        scanBtn.addEventListener('click', () => {
            // 切換至滾動動畫狀態
            initialState.classList.add('hidden');
            rollingState.classList.remove('hidden');

            let duration = 2000; // 模擬跑碼持續 2 秒
            let intervalTime = 60; // 每 60 毫秒極速切換一次
            let elapsed = 0;

            const timer = setInterval(() => {
                const randomPick = colorDatabase[Math.floor(Math.random() * colorDatabase.length)];
                
                // 動態渲染滾動樣式
                rollingCircle.style.backgroundColor = randomPick.color;
                rollingCircle.style.boxShadow = `0 0 25px ${randomPick.color}aa`;
                rollingTheme.textContent = randomPick.theme.split('】')[0] + '】分析中...';
                rollingHex.textContent = randomPick.color;

                elapsed += intervalTime;
                if (elapsed >= duration) {
                    clearInterval(timer);
                    renderFinalResult();
                }
            }, intervalTime);
        });

        function renderFinalResult() {
            // 隨機抽選最終決定色
            const finalPick = colorDatabase[Math.floor(Math.random() * colorDatabase.length)];

            rollingState.classList.add('hidden');
            resultState.classList.remove('hidden');

            // 渲染最終結果與柔和霓虹外光暈
            resultCircle.style.backgroundColor = finalPick.color;
            resultCircle.style.boxShadow = `0 15px 40px ${finalPick.color}88, 0 0 15px ${finalPick.color}44`;
            
            resultTheme.textContent = finalPick.theme;
            resultTask.textContent = finalPick.task;
            resultHex.textContent = finalPick.color;
            resultHex.style.backgroundColor = finalPick.color;
            
            // 計算對比色，確保色碼標籤字體清晰可讀
            resultHex.style.color = getContrastColor(finalPick.color);
        }

        // 重新抽選回到初始狀態
        rescanBtn.addEventListener('click', () => {
            resultState.classList.add('hidden');
            initialState.classList.remove('hidden');
        });

        // 智慧型對比色計算 (YIQ 權重演算法)
        function getContrastColor(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return (yiq >= 140) ? '#2b2d42' : '#ffffff';
        }

        // --- 進階體驗：雙重離線備援快取機制 (Service Worker & Cache API) ---
        
        // 1. 主執行緒立即快取 (確保當前頁面即使在 SW 啟用前也進入 Cache Storage)
        if ('caches' in window) {
            caches.open('travel-color-v1').then(cache => {
                cache.add(window.location.href)
                    .then(() => console.log('[Cache] 網頁主要資產已成功進行主執行緒預快取保護。'))
                    .catch(err => console.log('[Cache] 主執行緒預快取提示: ', err));
            });
        }

        // 2. 內聯動態註冊 Service Worker (建立獨立 Blob 沙盒)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swScript = `
                    const CACHE_NAME = 'travel-color-v1';
                    self.addEventListener('install', e => {
                        self.skipWaiting();
                    });
                    self.addEventListener('activate', e => {
                        e.waitUntil(self.clients.claim());
                    });
                    self.addEventListener('fetch', e => {
                        // 優先從快取中讀取，若無網路則實施無感加載
                        e.respondWith(
                            caches.match(e.request).then(response => {
                                return response || fetch(e.request);
                            })
                        );
                    });
                `;
                
                try {
                    const blob = new Blob([swScript], { type: 'text/javascript' });
                    const blobURL = URL.createObjectURL(blob);
                    
                    navigator.serviceWorker.register(blobURL)
                        .then(() => console.log('[SW] 離線安全網註冊成功，已啟用完全離線運行能力。'))
                        .catch(err => {
                            console.log('[SW] 瀏覽器預設阻擋 blob 網域安全限制。別擔心，主執行緒 Cache API 已完美接管離線儲存！');
                        });
                } catch (error) {
                    console.log('[SW] 建立失敗: ', error);
                }
            });
        }
    </script>
</body>
</html>
